<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Upload Sản Phẩm - Khang Gia Phúc</title>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <style>
        .upload-container { text-align: center; margin-top: 50px; font-family: Arial, sans-serif; }
        #upload-button { background-color: #007bff; color: white; padding: 12px 24px; border: none; cursor: pointer; border-radius: 5px; font-size: 16px; }
        #preview { margin-top: 20px; max-width: 300px; display: none; border: 1px solid #ddd; padding: 5px; }
        .url-display { margin-top: 15px; color: #28a745; font-weight: bold; word-break: break-all; }
    </style>
</head>
<body>

<div class="upload-container">
    <h2>Hệ thống đăng ảnh sản phẩm</h2>
    <button id="upload-button">Chọn ảnh sản phẩm</button>
    
    <div id="result">
        <p class="url-display" id="image-url"></p>
        <img id="preview" src="" alt="Xem trước">
    </div>
</div>

<script type="text/javascript">
    // Cấu hình thông tin của bạn ở đây
    const CLOUD_NAME = "dp1laqiqs"; 
    const UPLOAD_PRESET = "SanphamKGP";

    const myWidget = cloudinary.createUploadWidget({
        cloudName: dp1laqiqs, 
        uploadPreset: SanphamKGP,
        sources: ['local', 'camera', 'url'], // Cho phép tải từ máy, chụp ảnh hoặc dán link
        multiple: false, // Chỉ cho upload từng ảnh một để tránh nhầm lẫn
        cropping: true,  // Cho phép nhân viên cắt ảnh cho đều
        showSkipCropButton: false,
        croppingAspectRatio: 1, // Ép khung vuông (thường dùng cho web bán hàng/hoa)
    }, (error, result) => { 
        if (!error && result && result.event === "success") { 
            console.log('Xong! Thông tin ảnh: ', result.info); 
            
            // Hiển thị link ảnh để nhân viên copy hoặc lưu vào database
            const imageUrl = result.info.secure_url;
            document.getElementById("image-url").innerText = "Link ảnh: " + imageUrl;
            
            // Hiển thị ảnh xem trước
            const preview = document.getElementById("preview");
            preview.src = imageUrl;
            preview.style.display = "inline-block";
        }
    });

    document.getElementById("upload-button").addEventListener("click", function(){
        myWidget.open();
    }, false);
</script>

</body>
</html>
