<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGP Professional Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .sidebar-item.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="flex min-h-screen">

    <aside class="w-64 bg-white border-r border-slate-200 hidden md:flex flex-col">
        <div class="p-6">
            <img src="https://www.khanggiaphuc.com/data/logo.jpg" alt="Logo" class="h-10 rounded-lg">
            <p class="text-[10px] font-bold text-blue-600 mt-2 uppercase tracking-tighter">Công nghệ trong tầm tay</p>
        </div>
        
        <nav class="flex-1 px-4 space-y-2">
            <button onclick="loadData('0')" class="sidebar-item active w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 transition">
                <i class="fa-solid fa-house"></i> Tổng quan
            </button>
            <button onclick="loadData('620957187')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 transition">
                <i class="fa-solid fa-shield-halved"></i> Bảo hành
            </button>
            <button onclick="loadData('895747298')" class="sidebar-item w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-slate-600 transition">
                <i class="fa-solid fa-box"></i> Sản phẩm
            </button>
            <hr class="my-4 border-slate-100">
            <a href="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit" target="_blank" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-semibold text-orange-600 hover:bg-orange-50 transition">
                <i class="fa-solid fa-pen-to-square"></i> Quản trị dữ liệu
            </a>
        </nav>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 sticky top-0 z-10">
            <h2 id="page-title" class="font-bold text-slate-800 uppercase tracking-wide">Bảng điều khiển</h2>
            <div class="flex items-center gap-4">
                <span class="text-xs font-medium text-slate-500">Xin chào, Admin</span>
                <div class="h-8 w-8 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold">K</div>
            </div>
        </header>

        <div class="p-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm card-hover">
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Hệ thống</p>
                    <p class="text-2xl font-black text-slate-800 mt-1">Hoạt động</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm card-hover">
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Dữ liệu</p>
                    <p class="text-2xl font-black text-blue-600 mt-1">Real-time</p>
                </div>
                <div class="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm card-hover">
                    <p class="text-slate-500 text-xs font-bold uppercase tracking-widest">Bảo mật</p>
                    <p class="text-2xl font-black text-green-600 mt-1">An toàn</p>
                </div>
            </div>

            <div id="data-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="col-span-full flex justify-center py-20">
                    <i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600"></i>
                </div>
            </div>
        </div>
    </main>

    <script>
        // CẤU HÌNH: Thay ID file của bạn và xuất bản (Publish to Web) dưới dạng CSV
        const SHEET_ID = '18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE';
        
        async function loadData(gid) {
            const container = document.getElementById('data-container');
            const title = document.getElementById('page-title');
            container.innerHTML = `<div class="col-span-full flex justify-center py-20"><i class="fa-solid fa-circle-notch fa-spin text-4xl text-blue-600"></i></div>`;
            
            try {
                // Sử dụng định dạng CSV để lấy dữ liệu nhanh và không cần API Key
                const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=${gid}`;
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n').map(row => row.split(','));

                // Header là hàng đầu tiên
                const headers = rows[0];
                const content = rows.slice(1);

                title.innerText = gid === '0' ? 'Tổng quan hệ thống' : (gid === '895747298' ? 'Danh mục sản phẩm' : 'Quản lý bảo hành');

                let html = '';
                content.forEach(row => {
                    if(row.length < 2) return; // Bỏ qua hàng trống
                    html += `
                        <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm card-hover relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-3 bg-blue-50 text-blue-600 text-[10px] font-bold rounded-bl-xl uppercase">
                                ${row[0] || 'KGP'}
                            </div>
                            <h3 class="font-bold text-slate-800 text-lg mb-2">${row[1] || 'Chưa có tên'}</h3>
                            <div class="space-y-2 text-sm text-slate-600">
                                <p><i class="fa-solid fa-tag w-5"></i> <b>Loại:</b> ${row[2] || '...'}</p>
                                <p><i class="fa-solid fa-clock w-5"></i> <b>Cập nhật:</b> ${row[3] || 'Vừa xong'}</p>
                            </div>
                            <button class="mt-4 w-full py-2 bg-slate-50 hover:bg-blue-600 hover:text-white text-slate-600 rounded-lg text-xs font-bold transition">
                                XEM CHI TIẾT
                            </button>
                        </div>
                    `;
                });
                container.innerHTML = html;

            } catch (error) {
                container.innerHTML = `<p class="col-span-full text-center text-red-500 font-bold">Lỗi tải dữ liệu. Hãy đảm bảo bạn đã "Xuất bản lên web" (Publish to Web) file Sheet.</p>`;
            }
        }

        // Tải trang mặc định
        loadData('0');

        // Logic active sidebar
        document.querySelectorAll('.sidebar-item').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sidebar-item').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
