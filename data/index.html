<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGP Dashboard v11 | Upload & Sync Sheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .workspace-card { height: calc(100vh - 280px); min-height: 550px; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .tab-btn { @apply px-5 py-2.5 rounded-xl font-bold text-xs transition-all duration-300 flex items-center gap-2 whitespace-nowrap uppercase border border-transparent text-slate-500; }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg; }
    </style>
</head>
<body>

    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-[1536px] mx-auto px-4 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-4">
                    <img src="https://www.khanggiaphuc.com/data/logo.jpg" class="h-12 w-auto rounded-xl shadow">
                    <h1 class="text-lg font-black text-slate-900 hidden sm:block tracking-tighter">KHANG GIA PHÚC</h1>
                </div>
                <button onclick="handleAuth()" class="px-4 py-2 rounded-xl bg-white border font-bold text-xs shadow-sm flex items-center gap-2">
                    <i class="fa-brands fa-google text-blue-500"></i> <span id="auth-text">Google Auth</span>
                </button>
            </div>
            <div class="pb-3 flex overflow-x-auto gap-2 no-scrollbar">
                <button onclick="switchTab(this, '0')" class="tab-btn active"><i class="fa-solid fa-house"></i> Trang Chủ</button>
                <button onclick="switchTab(this, '620957187')" class="tab-btn"><i class="fa-solid fa-shield"></i> Bảo Hành</button>
                <button onclick="switchTab(this, '895747298')" class="tab-btn"><i class="fa-solid fa-box"></i> Sản Phẩm</button>
                <button onclick="switchTab(this, '809858153')" class="tab-btn"><i class="fa-solid fa-users"></i> Khách Hàng</button>
                <button onclick="switchTab(this, 'drive')" class="tab-btn"><i class="fa-solid fa-images"></i> Kho Ảnh</button>
                <button onclick="switchTab(this, 'upload-sync')" class="tab-btn text-orange-600 font-black"><i class="fa-solid fa-cloud-arrow-up"></i> UPLOAD & SYNC</button>
            </div>
        </div>
    </header>

    <main class="max-w-[1536px] mx-auto px-4 lg:px-8 py-6">
        <div id="workspace" class="workspace-card" data-aos="fade-up">
            <iframe id="main-frame" src="https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit?rm=minimal&gid=0" class="w-full h-full"></iframe>
            
            <!-- Upload Sync UI -->
            <div id="upload-ui" class="hidden p-8 h-full overflow-y-auto bg-slate-50">
                <div class="max-w-xl mx-auto bg-white p-8 rounded-3xl shadow-xl space-y-6">
                    <div class="text-center">
                        <div class="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fa-solid fa-bolt text-2xl"></i>
                        </div>
                        <h2 class="text-2xl font-black">Upload & Ghi vào Sheet</h2>
                        <p class="text-sm text-slate-500">Tự động tải ảnh lên Drive và chèn link vào bảng tính</p>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">1. Chọn Tab muốn ghi dữ liệu</label>
                            <select id="sheet-tab" class="w-full p-3 rounded-xl border bg-slate-50 font-bold text-sm outline-none focus:ring-2 ring-blue-500">
                                <option value="BaoHanh">Tab: Bảo Hành</option>
                                <option value="SanPham">Tab: Sản Phẩm</option>
                                <option value="Du_An">Tab: Khách Hàng</option>
                                <option value="Trang_Chu">Tab: Trang Chủ</option>
                            </select>
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">2. Ghi chú nội dung</label>
                            <input type="text" id="file-note" placeholder="Ví dụ: Ảnh bàn giao công trình..." class="w-full p-3 rounded-xl border bg-slate-50 text-sm outline-none focus:ring-2 ring-blue-500">
                        </div>

                        <div>
                            <label class="block text-[10px] font-black uppercase text-slate-400 mb-2">3. Chọn hình ảnh</label>
                            <input type="file" id="file-input" accept="image/*" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-blue-50 file:text-blue-700 font-bold">
                        </div>

                        <button onclick="startUpload()" id="btn-upload" class="w-full py-4 bg-blue-600 text-white font-black rounded-2xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition-all active:scale-95">
                            BẮT ĐẦU TẢI LÊN & ĐỒNG BỘ
                        </button>
                    </div>

                    <div id="status" class="hidden p-4 rounded-2xl text-center text-sm font-bold"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();
        const WEB_APP_URL = "DÁN_URL_APPS_SCRIPT_CỦA_BẠN_VÀO_ĐÂY"; // <--- QUAN TRỌNG

        function switchTab(btn, target) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            const frame = document.getElementById('main-frame');
            const ui = document.getElementById('upload-ui');

            if(target === 'upload-sync') {
                frame.classList.add('hidden');
                ui.classList.remove('hidden');
            } else {
                frame.classList.remove('hidden');
                ui.classList.add('hidden');
                frame.src = (target === 'drive') ? "https://drive.google.com/embeddedfolderview?id=1dn5E5YMSmYHoq1IEJ9l84oVQeLaOJvFM#grid" : `https://docs.google.com/spreadsheets/d/18ce9-AdNPMv_CPKCKQqRD4k0jTw1Hv-xZLF_Q4ZaubE/edit?rm=minimal&gid=${target}`;
            }
        }

        function startUpload() {
            const file = document.getElementById('file-input').files[0];
            const note = document.getElementById('file-note').value;
            const tab = document.getElementById('sheet-tab').value;
            const status = document.getElementById('status');
            const btn = document.getElementById('btn-upload');

            if(!file || !note) return alert("Vui lòng chọn ảnh và nhập ghi chú!");

            btn.disabled = true;
            btn.innerText = "ĐANG XỬ LÝ...";
            status.classList.remove('hidden');
            status.className = "p-4 rounded-2xl text-center text-sm font-bold bg-slate-100 text-slate-600";
            status.innerText = "Đang mã hóa ảnh...";

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64 = e.target.result.split(',')[1];
                const payload = {
                    base64: base64,
                    type: file.type,
                    name: file.name,
                    note: note,
                    tabName: tab
                };

                fetch(WEB_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(res => res.json())
                .then(data => {
                    if(data.result === "success") {
                        status.className = "p-4 rounded-2xl text-center text-sm font-bold bg-green-100 text-green-600";
                        status.innerHTML = `Thành công! <br> <a href="${data.url}" target="_blank" class="underline">Xem ảnh</a>`;
                        document.getElementById('file-input').value = "";
                        document.getElementById('file-note').value = "";
                    } else {
                        throw new Error(data.error);
                    }
                })
                .catch(err => {
                    status.className = "p-4 rounded-2xl text-center text-sm font-bold bg-red-100 text-red-600";
                    status.innerText = "Lỗi: " + err.message;
                })
                .finally(() => {
                    btn.disabled = false;
                    btn.innerText = "BẮT ĐẦU TẢI LÊN & ĐỒNG BỘ";
                });
            };
            reader.readAsDataURL(file);
        }

        function handleAuth() {
            if(confirm("Thoát về trang chủ ht25vn.com?")) window.location.href = "https://ht25vn.com";
        }
    </script>
</body>
</html>
