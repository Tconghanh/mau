<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGP Quản Trị Hệ Thống | GitHub Integration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .workspace-card { height: calc(100vh - 280px); min-height: 550px; background: white; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); overflow: hidden; border: 1px solid #e2e8f0; }
        .tab-btn { @apply px-5 py-2.5 rounded-xl font-bold text-xs transition-all duration-300 flex items-center gap-2 whitespace-nowrap uppercase border border-transparent text-slate-500; }
        .tab-btn.active { @apply bg-blue-600 text-white shadow-lg shadow-blue-200; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="glass-nav sticky top-0 z-50">
        <div class="max-w-[1536px] mx-auto px-4 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex items-center gap-4">
                    <img src="https://www.khanggiaphuc.com/data/logo.jpg" alt="Logo" class="h-12 w-auto rounded-xl">
                    <h1 class="text-lg font-black text-slate-900 hidden sm:block">KHANG GIA PHÚC</h1>
                </div>
                <button id="auth-btn" onclick="handleAuth()" class="px-4 py-2 rounded-xl bg-white border font-bold text-xs shadow-sm hover:bg-slate-50 transition">
                    <i class="fa-brands fa-google mr-2"></i><span id="auth-text">Đăng nhập</span>
                </button>
            </div>
            <!-- Menu -->
            <div class="pb-3 flex overflow-x-auto gap-2 no-scrollbar">
                <button onclick="switchTab(this, '0')" class="tab-btn active"><i class="fa-solid fa-house"></i> Trang Chủ</button>
                <button onclick="switchTab(this, '809858153')" class="tab-btn"><i class="fa-solid fa-shield"></i> Dự án</button>
                <button onclick="switchTab(this, '895747298')" class="tab-btn"><i class="fa-solid fa-box"></i> Sản Phẩm</button>
                <button onclick="switchTab(this, 'drive')" class="tab-btn"><i class="fa-solid fa-folder-open"></i> Hosting - dữ liệu</button>
                <button onclick="switchTab(this, 'github-upload')" class="tab-btn"><i class="fa-brands fa-github"></i> Upload GitHub</button>
            </div>
        </div>
    </header>

    <!-- Workspace -->
    <main class="max-w-[1536px] mx-auto px-4 lg:px-8 py-6">
        <div id="workspace" class="workspace-card" data-aos="fade-up">
            <iframe id="main-frame" src="https://docs.google.com/spreadsheets/d/1knLdhA1j69Qqfa6nMIe20vfufQnvGr4THpehnK0mHPk/edit?rm=minimal&gid=0"></iframe>
            
            <!-- GitHub Upload UI (Hidden by default) -->
            <div id="github-ui" class="hidden p-8 h-full overflow-y-auto">
                <div class="max-w-xl mx-auto space-y-6">
                    <div class="text-center">
                        <i class="fa-brands fa-github text-5xl mb-4 text-slate-800"></i>
                        <h2 class="text-2xl font-bold">Tải file lên GitHub</h2>
                        <p class="text-sm text-slate-500">Cập nhật tài nguyên trực tiếp cho website Khanggiaphuc.com</p>
                    </div>

                    <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 space-y-3">
                        <label class="block text-xs font-bold text-blue-700">Mã upload (Được cung cấp qua email)</label>
                        <input type="password" id="gh-token" placeholder="Nhập Personal Access Token..." class="w-full px-4 py-2 rounded-lg border focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                        <p class="text-[10px] text-blue-600 italic">* Token này không được lưu vào code, chỉ lưu trong trình duyệt của bạn.</p>
                    </div>

                    <div class="space-y-4">
                        <input type="file" id="gh-file" class="w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                        <input type="text" id="gh-path" placeholder="Đường dẫn file (VD: data/anh1.jpg)" class="w-full px-4 py-2 rounded-lg border text-sm">
                        <button onclick="uploadToGithub()" id="upload-btn" class="w-full bg-slate-900 text-white font-bold py-3 rounded-xl hover:bg-slate-800 transition">BẮT ĐẦU TẢI LÊN</button>
                    </div>
                    
                    <div id="upload-status" class="hidden p-4 rounded-xl text-sm font-medium text-center"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });
        const frame = document.getElementById('main-frame');
        const githubUI = document.getElementById('github-ui');

        function switchTab(btn, target) {
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            if(target === 'github-upload') {
                frame.classList.add('hidden');
                githubUI.classList.remove('hidden');
            } else {
                frame.classList.remove('hidden');
                githubUI.classList.add('hidden');
                if(target === 'drive') {
                    frame.src = "https://drive.google.com/embeddedfolderview?id=1-icx6ejwaG2GbGobqSErVyDsNi6YmDCh#grid";
                } else {
                    frame.src = `https://docs.google.com/spreadsheets/d/1knLdhA1j69Qqfa6nMIe20vfufQnvGr4THpehnK0mHPk/edit?rm=minimal&gid=${target}`;
                }
            }
        }

        async function uploadToGithub() {
            const token = document.getElementById('gh-token').value;
            const fileInput = document.getElementById('gh-file');
            const path = document.getElementById('gh-path').value;
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('upload-btn');

            if(!token || !fileInput.files[0] || !path) {
                alert("Vui lòng điền đầy đủ thông tin!");
                return;
            }

            status.classList.remove('hidden');
            status.className = "p-4 rounded-xl text-sm font-medium text-center bg-gray-100";
            status.innerText = "Đang mã hóa và tải lên...";
            btn.disabled = true;

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async function() {
                const content = reader.result.split(',')[1]; // Lấy base64
                const repo = "Tconghanh/khanggiaphuc.com"; // <--- THAY ĐỔI Ở ĐÂY

                try {
                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: `Upload file: ${path}`,
                            content: content
                        })
                    });

                    if(response.ok) {
                        status.className = "p-4 rounded-xl text-sm font-medium text-center bg-green-100 text-green-700";
                        status.innerText = "Thành công! File đã được đưa lên GitHub.";
                    } else {
                        const err = await response.json();
                        throw new Error(err.message);
                    }
                } catch (e) {
                    status.className = "p-4 rounded-xl text-sm font-medium text-center bg-red-100 text-red-700";
                    status.innerText = "Lỗi: " + e.message;
                } finally {
                    btn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
