<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KGP Dashboard | Hệ Thống Quản Trị</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --wp-sidebar: #1d2327;
            --wp-sidebar-hover: #2271b1;
            --wp-bg: #f0f0f1;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--wp-bg);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Style */
        .wp-sidebar {
            width: 160px;
            background: var(--wp-sidebar);
            color: #f0f0f1;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }

        .wp-brand {
            padding: 15px;
            background: #000;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-item {
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #f0f0f1;
            transition: all 0.1s;
            cursor: pointer;
            border-left: 4px solid transparent;
        }

        .nav-item:hover {
            background: rgba(255,255,255,0.1);
            color: #72aee6;
        }

        .nav-item.active {
            background: var(--wp-sidebar-hover);
            color: white;
            border-left-color: white;
        }

        /* Main Content */
        .wp-main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .wp-toolbar {
            height: 32px;
            background: #1d2327;
            color: #c3c4c7;
            display: flex;
            align-items: center;
            padding: 0 20px;
            font-size: 13px;
            justify-content: space-between;
        }

        .wp-content {
            padding: 20px;
            flex-grow: 1;
            overflow-y: auto;
        }

        .workspace-card {
            background: white;
            border: 1px solid #c3c4c7;
            box-shadow: 0 1px 1px rgba(0,0,0,.04);
            height: calc(100vh - 100px);
            position: relative;
        }

        iframe { width: 100%; height: 100%; border: none; }

        /* WP Button Style */
        .wp-button {
            background: #2271b1;
            border: 1px solid #2271b1;
            color: #fff;
            padding: 8px 16px;
            border-radius: 3px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .wp-button:hover { background: #135e96; }

        /* Custom Input WP */
        .wp-input {
            border: 1px solid #8c8f94;
            padding: 6px 10px;
            border-radius: 4px;
            width: 100%;
            font-size: 14px;
        }
        .wp-input:focus { border-color: #2271b1; outline: 2px solid #2271b1; }
    </style>
</head>
<body>

    <aside class="wp-sidebar">
        <div class="wp-brand">
            <i class="fa-solid fa-gauge-high"></i>
            <span>KGP ADMIN</span>
        </div>
        <nav class="mt-4">
            <div onclick="switchTab(this, '0')" class="nav-item active">
                <i class="fa-solid fa-house"></i> Bảng tin
            </div>
            <div onclick="switchTab(this, '809858153')" class="nav-item">
                <i class="fa-solid fa-diagram-project"></i> Dự án
            </div>
            <div onclick="switchTab(this, '895747298')" class="nav-item">
                <i class="fa-solid fa-cart-shopping"></i> Sản phẩm
            </div>
            <div onclick="switchTab(this, 'drive')" class="nav-item">
                <i class="fa-solid fa-hdd"></i> Hosting
            </div>
            <div onclick="switchTab(this, 'github-upload')" class="nav-item">
                <i class="fa-brands fa-github"></i> GitHub Sync
            </div>
        </nav>
    </aside>

    <main class="wp-main">
        <div class="wp-toolbar">
            <div class="flex gap-4">
                <span><i class="fa-solid fa-earth-americas mr-1"></i> Khang Gia Phúc</span>
                <span><i class="fa-solid fa-rotate mr-1"></i> 0</span>
            </div>
            <div>Chào, Quản trị viên <i class="fa-solid fa-user-circle ml-1"></i></div>
        </div>

        <div class="wp-content">
            <h2 id="page-title" class="text-2xl font-normal text-[#1d2327] mb-4">Bảng điều khiển</h2>
            
            <div id="workspace" class="workspace-card">
                <iframe id="main-frame" src="https://docs.google.com/spreadsheets/d/1knLdhA1j69Qqfa6nMIe20vfufQnvGr4THpehnK0mHPk/edit?rm=minimal&gid=0"></iframe>
                
                <div id="github-ui" class="hidden p-10 bg-white h-full overflow-y-auto">
                    <div class="max-w-2xl">
                        <h3 class="text-xl mb-6 border-b pb-2">Tải tệp tin lên hệ thống GitHub</h3>
                        
                        <table class="w-full border-separate border-spacing-y-4">
                            <tr>
                                <td class="w-1/3 font-bold text-sm text-gray-700">GitHub Access Token</td>
                                <td>
                                    <input type="password" id="gh-token" class="wp-input" placeholder="ghp_xxxxxxxxxxxx">
                                    <p class="text-xs text-gray-500 mt-1 italic">Mã định danh bảo mật từ GitHub Settings.</p>
                                </td>
                            </tr>
                            <tr>
                                <td class="font-bold text-sm text-gray-700">Chọn tệp tin</td>
                                <td>
                                    <input type="file" id="gh-file" onchange="updatePath(this)" class="text-sm">
                                </td>
                            </tr>
                            <tr>
                                <td class="font-bold text-sm text-gray-700">Đường dẫn đích (mặc định)</td>
                                <td>
                                    <input type="text" id="gh-path" value="data/" class="wp-input bg-gray-100" readonly>
                                </td>
                            </tr>
                            <tr>
                                <td></td>
                                <td>
                                    <button onclick="uploadToGithub()" id="upload-btn" class="wp-button">
                                        Lưu thay đổi và Tải lên
                                    </button>
                                </td>
                            </tr>
                        </table>

                        <div id="upload-status" class="hidden mt-6 p-4 border-l-4 bg-white shadow-sm text-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({ duration: 800 });
        const frame = document.getElementById('main-frame');
        const githubUI = document.getElementById('github-ui');
        const pageTitle = document.getElementById('page-title');

        function switchTab(el, target) {
            // Update Active Menu
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            el.classList.add('active');

            // Update Title
            pageTitle.innerText = el.innerText.trim();

            if(target === 'github-upload') {
                frame.classList.add('hidden');
                githubUI.classList.remove('hidden');
            } else {
                frame.classList.remove('hidden');
                githubUI.classList.add('hidden');
                if(target === 'drive') {
                    frame.src = "https://drive.google.com/embeddedfolderview?id=1-icx6ejwaG2GbGobqSErVyDsNi6YmDCh#grid";
                } else {
                    frame.src = `https://docs.google.com/spreadsheets/d/1knLdhA1j69Qqfa6nMIe20vfufQnvGr4THpehnK0mHPk/edit?rm=minimal&gid=${target}`;
                }
            }
        }

        function updatePath(input) {
            const pathInput = document.getElementById('gh-path');
            if (input.files && input.files[0]) {
                pathInput.value = "data/" + input.files[0].name;
            } else {
                pathInput.value = "data/";
            }
        }

        async function uploadToGithub() {
            const token = document.getElementById('gh-token').value;
            const fileInput = document.getElementById('gh-file');
            const path = document.getElementById('gh-path').value;
            const status = document.getElementById('upload-status');
            const btn = document.getElementById('upload-btn');

            if(!token || !fileInput.files[0] || path === "data/") {
                alert("Vui lòng nhập Token và chọn tệp tin!");
                return;
            }

            status.classList.remove('hidden');
            status.className = "mt-6 p-4 border-l-4 border-blue-500 bg-white shadow-sm text-sm text-blue-600";
            status.innerText = "Đang xử lý tải lên...";
            btn.disabled = true;

            const file = fileInput.files[0];
            const reader = new FileReader();
            
            reader.onload = async function() {
                const content = reader.result.split(',')[1]; 
                const repo = "Tconghanh/khanggiaphuc.com"; 

                try {
                    let sha = "";
                    const checkRes = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        headers: { 'Authorization': `token ${token}` }
                    });
                    
                    if (checkRes.ok) {
                        const fileData = await checkRes.json();
                        sha = fileData.sha;
                    }

                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `token ${token}`,
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            message: `WP-Admin Upload: ${path}`,
                            content: content,
                            sha: sha
                        })
                    });

                    if(response.ok) {
                        status.className = "mt-6 p-4 border-l-4 border-green-500 bg-white shadow-sm text-sm text-green-700";
                        status.innerHTML = `<strong>Thành công!</strong> Tệp tin đã được cập nhật tại thư mục /data.`;
                    } else {
                        const err = await response.json();
                        throw new Error(err.message);
                    }
                } catch (e) {
                    status.className = "mt-6 p-4 border-l-4 border-red-500 bg-white shadow-sm text-sm text-red-700";
                    status.innerText = "Lỗi hệ thống: " + e.message;
                } finally {
                    btn.disabled = false;
                }
            };
            reader.readAsDataURL(file);
        }
    </script>
</body>
</html>
